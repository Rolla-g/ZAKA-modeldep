
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Deployment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1f4e79;
            text-align: center;
        }
        p {
            text-align: center;
            color: #444;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            margin-top: 15px;
        }
        button {
            margin-top: 20px;
            width: 100%;
            background: #1f4e79;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #163a59;
        }
        .result {
            margin-top: 30px;
            background: #eef4fa;
            padding: 20px;
            border-radius: 8px;
        }
        .label {
            font-weight: bold;
            color: #1f4e79;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Model Deployment</h1>
        <p>Enter an English medical sentence and get the French translation.</p>

        <form method="POST">
            <textarea name="input_text" placeholder="Type your English sentence here...">{{ input_text }}</textarea>
            <button type="submit">Translate</button>
        </form>

        {% if translation %}
        <div class="result">
            <p><span class="label">French Translation:</span></p>
            <p>{{ translation }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
